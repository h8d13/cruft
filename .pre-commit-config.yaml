repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff-check
        args: [--fix]

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.16
    hooks:
      - id: vulture
        args: [src/, main]

  - repo: https://github.com/h8d13/cruft
    rev: 19ea647d8f32f404e53d099661b862d2d8130837
    hooks:
      - id: duper
